services:
  ollama:
    image: ollama/ollama
    container_name: whole-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: whole-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ui_data:/app/backend/data

volumes:
  ollama_data:
  ui_data:
